<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css">
</head>
<body>

    <form id="formRecuperacion" novalidate>
        <h2>Formulario de registro</h2>

        <label for="nombre">Nombre:</label>
        <input 
            type="text" 
            id="nombre" 
            name="nombre"
            pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]{3,50}"
            placeholder="Ej. Juan López" 
            required 
            autofocus
        >
        <span class="mensaje" id="error-nombre"></span>
        
        <label for="correo">Correo electrónico:</label>
        <input 
            type="email" 
            id="correo" 
            name="correo"
            placeholder="correo@ejemplo.com" 
            required
        >

        <label for="password">Contraseña:</label>
        <input 
            type="password" 
            id="password" 
            name="password"
            minlength="8"
            placeholder="Mínimo 8 caracteres"
            required
        >
        <span class="mensaje" id="error-password"></span>

        <label for ="pregunta">Pregunta de recuperación</label>
        <input
            type="text"
            id="preguntaRecuperacion"
            name="preguntaRecuperacion"
            placeholder="Nombre de tu primer mascota?"
            required
        >

        <span class="mensaje" id="error-correo"></span>
        <p class="link-recuperacion">
            ¿Olvidaste tu contraseña? 
            <a href="recuperacionCuenta.html">Recuperar</a>
        </p>
        <div class="btnContainer">            
            <button class="submit" type="submit">Enviar</button>
            <button class="reset" type="reset">Limpiar</button>
        </div>  
    </form>

    <pre id="resultado"></pre>

    <script src="../js/validateFormB.js"></script>
</body>
</html>
